name: Scrape SICOES

# Runs daily at 10:00 UTC = 06:00 Bolivia (UTC-4).
# Manual trigger via GitHub UI ("Run workflow") also enabled.
on:
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch:

jobs:
  scrape:
    name: Scrape and cache SICOES tenders
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci

      - name: Install patchright Chromium (with system deps)
        # patchright shares Playwright's browser binaries
        run: npx patchright install --with-deps chromium

      - name: Run SICOES scraper
        env:
          INSTANTDB_ADMIN_TOKEN: ${{ secrets.INSTANTDB_ADMIN_TOKEN }}
        run: npx tsx scripts/scrape-sicoes.ts

      - name: Upload debug screenshots/HTML on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-debug
          path: scraper-debug/
          if-no-files-found: warn
          retention-days: 7
