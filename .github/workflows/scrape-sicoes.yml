name: Scrape SICOES

# Runs daily at 10:00 UTC = 06:00 Bolivia (UTC-4).
# Also exposes a manual trigger via GitHub UI ("Run workflow").
on:
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch:

jobs:
  scrape:
    name: Scrape and cache SICOES tenders
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci

      - name: Install Playwright Chromium (with system deps)
        run: npx playwright install --with-deps chromium

      - name: Run SICOES scraper
        env:
          INSTANTDB_ADMIN_TOKEN: ${{ secrets.INSTANTDB_ADMIN_TOKEN }}
        run: npx tsx scripts/scrape-sicoes.ts

      - name: Upload Playwright trace on failure (for debugging)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-trace
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore
          retention-days: 7
